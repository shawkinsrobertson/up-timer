<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.3.0/css/font-awesome.min.css">
    <title>Up Timer</title>
     <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            gap:20px;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        .tab-container {
            position: relative;
            width: 400px;
            height: 450px;
        }

        .tabs {
            display: flex;
            justify-content: space-between;
            gap: 5px;
            margin-bottom: -1px;
            position: absolute;
            top: -43px;
            left: 0;
            z-index: 10;
        }

        .tab-button {
            padding: 12px 24px;
            background-color: #e0e0e0;
            border: 1px solid #007BFF;
            border-bottom: none;
            border-radius: 5px 5px 0 0;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .tab-button.active {
            background-color: #f1efef;
            color: #007BFF;
            font-weight: bold;
        }

        .tab-button:hover {
            background-color: #d0d0d0;
        }

        .tab-button.active:hover {
            background-color: #f1efef;
        }

        #timer, #timer2 {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: none;
            flex-direction: column;
            gap: 16px;
            align-items: center;
            border-radius: 0 8px 8px 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 20px;
            background-color: #f1efef;
            border: 1px solid #007BFF;
        }

        #timer.active, #timer2.active {
            display: flex;
            z-index: 5;
        }

        h1 {
            margin: 0;
            font-size: 1.1em;
        }

        #timerDisplay, #timerDisplay2 {
            font-size: 2em;
            background-color: #fff;
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            min-width: 150px;
            text-align: center;
        }

        .quick-select {
            display: flex;
            gap: 10px;
        }

        #thirtySecondBtn, #oneMinuteBtn, #ninetySecondBtn, 
        #thirtyThirtyBtn, #fortyTwentyBtn, #thirtyFifteenBtn, 
        #fortyFiveFifteenBtn {
            padding: 10px 16px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }

        .startBtn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            background-color: #007BFF;
            color: white;
            cursor: pointer;
        }

        .stopBtn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            background-color: #ff4800;
            color: white;
            cursor: pointer;
        }

        .resetBtn {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            background-color: #28a745;
            color: white;
            cursor: pointer;
        }

        /* Responsive adjustments */
        @media (max-width: 500px) {
            .tab-container {
                width: 80%;
                height: auto;
            }
            #timer, #timer2 {
                position: relative;
                width: 80%;
                padding: 20px;
                border-radius: 8px;
            }
            .tabs {
                position: relative;
                top: 0;
                left: 0;
                justify-content: center;
            }

            .quick-select {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="timer" id="timerDisplay">00:00:00</div>
    <div><button id="startBtn">Start</button>
    <button id="stopBtn">Stop</button>
<button id="resetBtn">Reset</button></div>
    <script>
        // 1. Select the button and the display element
const startButton = document.getElementById("startBtn");
const stopButton = document.getElementById("stopBtn");
const resetButton = document.getElementById("resetBtn");
const timerDisplay = document.getElementById("timerDisplay");

// 2. Initialize variables outside the function to maintain state
let totalSeconds = 0;
let intervalId = null;

// 3. Add the click event listener
startButton.addEventListener("click", function() {
    // Prevent starting multiple intervals if the button is clicked repeatedly
    if (intervalId) {
        clearInterval(intervalId);
    }

    // 4. Start the interval only when the button is clicked
    intervalId = setInterval(function() {
        totalSeconds++;
        
        // Format the time (optional: MM:SS)
        const hours = Math.floor(totalSeconds / 3600);
        const minutes = Math.floor(totalSeconds / 60);
        const seconds = totalSeconds % 60;
        
        // Update the display
        timerDisplay.textContent = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        
    }, 1000); // Run every 1000 milliseconds (1 second)

    // 5. Add the stop button functionality
    stopButton.addEventListener("click", function() {
        clearInterval(intervalId); // Stop the interval
        intervalId = null; // Reset the interval ID
    });

    // 6. Add the reset button functionality
    resetButton.addEventListener("click", function() {
        clearInterval(intervalId); // Stop the interval
        intervalId = null; // Reset the interval ID
        totalSeconds = 0; // Reset the total seconds
        timerDisplay.textContent = "00:00"; // Reset the display
    });
});   
    </script>
</body>
</html>
